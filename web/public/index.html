<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manhwa Machine Translator</title>
    <meta name="description" content="Automatically detect, translate and read Korean manhwa chapters in your browser.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ── Navbar ─────────────────────────────────────────── -->
    <nav class="navbar">
        <div class="logo" onclick="switchView('library-view', loadLibrary)">
            <span>⬡</span> Manhwa Translator
        </div>
        <div>
            <button class="btn" onclick="switchView('library-view', loadLibrary)">Library</button>
        </div>
    </nav>

    <main>

        <!-- ── LIBRARY VIEW ───────────────────────────────── -->
        <section id="library-view" class="view active">
            <div class="view-header">
                <h1>My Library</h1>
                <button class="btn btn-primary" onclick="openModal('addSeriesModal')">+ New Series</button>
            </div>
            <div id="series-grid" class="grid">
                <!-- Dynamically populated by library.js -->
            </div>
        </section>

        <!-- ── SERIES DETAIL VIEW ─────────────────────────── -->
        <section id="series-view" class="view">
            <button class="btn" style="margin-bottom:1rem;"
                onclick="switchView('library-view', loadLibrary)">← Back to Library</button>

            <div class="series-header" id="series-details-container">
                <!-- Populated by series.js -->
            </div>

            <div class="view-header" style="margin-bottom:1rem;">
                <h2>Chapters Dashboard</h2>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <button class="btn" onclick="openChapterSelectModal(AppState.currentSeriesId)">Scrape Newtoki</button>
                    <button class="btn btn-primary" onclick="openModal('addChapterModal')">+ Add Raw</button>
                    <button class="btn btn-danger"
                        onclick="deleteSeriesAndReturn()">🗑 Delete Series</button>
                </div>
            </div>


            <div style="display:flex;gap:2rem;margin-top:1rem;align-items:flex-start;">
                <div style="flex:1;min-width:0;">
                    <h3 style="margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;">
                        Raw Chapters
                    </h3>
                    <div id="raw-chapter-list" class="chapter-list"></div>
                </div>
                <div style="flex:1;min-width:0;">
                    <h3 style="margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;color:var(--primary);">
                        Translated Chapters
                    </h3>
                    <div id="translated-chapter-list" class="chapter-list"></div>
                </div>
            </div>
        </section>

        <!-- ── READER VIEW ────────────────────────────────── -->
        <section id="reader-view" class="view">
            <div class="view-header">
                <button class="btn"
                    onclick="switchView('series-view', () => loadSeries(AppState.currentSeriesId))">
                    ← Back to Series
                </button>
                <h2 id="reader-title">Chapter View</h2>
                <div></div>
            </div>

            <div id="reader-pages" style="text-align:center;"></div>

            <div class="reader-controls">
                <button class="btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Top</button>
                <button class="btn" id="toggle-translation-btn"
                    onclick="toggleTranslationState()">View Original</button>
            </div>
        </section>

    </main>

    <!-- ── Modal: Add Series ──────────────────────────────── -->
    <div class="modal-overlay" id="addSeriesModal">
        <div class="modal">
            <h2>Add New Series</h2>
            <form id="addSeriesForm" onsubmit="submitAddSeries(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" class="form-control" name="title" id="seriesTitleInput" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Newtoki Series URL
                        <span style="color:var(--text-muted);font-size:0.8rem;">(poster auto-fetched)</span>
                    </label>
                    <input type="url" class="form-control" name="source_url" id="seriesSourceUrl"
                        placeholder="https://newtoki…/webtoon/…">
                </div>
                <div id="poster-preview-wrap"
                    style="display:none;margin-top:-0.5rem;margin-bottom:1rem;">
                    <div style="font-size:0.75rem;color:var(--text-muted);">
                        ✓ Cover will be fetched automatically after saving
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('addSeriesModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="addSeriesBtn">Create Series</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Modal: Upload Chapter (manual) ────────────────── -->
    <div class="modal-overlay" id="addChapterModal">
        <div class="modal">
            <h2>Upload New Chapter</h2>
            <form id="addChapterForm" onsubmit="submitAddChapter(event)">
                <div class="form-group">
                    <label>Chapter Number</label>
                    <input type="number" class="form-control" name="chapter_number"
                        id="nextChapterNum" required step="any">
                </div>
                <div class="form-group">
                    <label>Context <span style="color:var(--text-muted);font-size:0.8rem;">(optional: character names, tone)</span></label>
                    <textarea class="form-control" name="context" rows="2"
                        placeholder="e.g. MC's name is Jinwoo"></textarea>
                </div>
                <div class="form-group">
                    <label>Upload Pages</label>
                    <label for="chapterFiles" class="file-upload-label">
                        <div class="upload-area">
                            <div id="upload-text">
                                Click to select folder or drag &amp; drop<br>
                                <span style="font-size:0.8rem;color:var(--text-muted);">(Select an entire folder of images)</span>
                            </div>
                            <input type="file" id="chapterFiles" name="files"
                                multiple webkitdirectory directory accept="image/*"
                                onchange="updateFileCount(this)" required style="display:none;">
                        </div>
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('addChapterModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="uploadChapterBtn">Upload &amp; Translate</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Modal: Chapter Select (Newtoki) ───────────────── -->
    <div class="modal-overlay" id="chapterSelectModal">
        <div class="modal" style="max-width:660px;width:95%;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h2 style="margin:0;">Select Chapters to Scrape</h2>
                <button class="btn" onclick="closeModal('chapterSelectModal')"
                    style="padding:0.3rem 0.8rem;">✕</button>
            </div>
            <p id="chapter-select-info"
                style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;"></p>
            <div id="chapter-select-body"
                style="max-height:55vh;overflow-y:auto;border:1px solid var(--border);
                       border-radius:8px;padding:0.5rem;"></div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('chapterSelectModal')">Cancel</button>
                <button class="btn btn-primary" id="scrapeSelectedBtn"
                    onclick="scrapeSelected()" disabled>Scrape Selected</button>
            </div>
        </div>
    </div>

    <!-- ── Scripts (load order matters: config → nav → modules → app) ── -->
    <script src="js/config.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/library.js"></script>
    <script src="js/series.js"></script>
    <script src="js/chapters.js"></script>
    <script src="js/reader.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
